<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çavuşoğlu Cafe & Pastane</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header class="hero">
        <div class="hero-overlay"></div>
        <img src="/images/pp.jpg" class="hero-logo" onerror="this.src='/images/default.jpg'">
        <h1 class="hero-title">Çavuşoğlu Cafe & Pastane</h1>
    </header>

    <div class="container search-section">
        <div class="row justify-content-center">
            <div class="col-md-8 position-relative">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="searchInput" class="form-control search-bar"
                        placeholder="Canınız ne çekiyor? (Baklava, Çay...)">
                </div>
                <div id="searchResults"></div>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <div id="category-container" class="row g-4">
        </div>
    </div>

    <footer class="footer mt-5 py-5 text-center"
        style="background-color: #2a2a2a; border-top: 1px solid #ddd; color: #ffffff;">
        <div class="container">
            <a href="https://maps.app.goo.gl/uYfbsCTx1N75GxHD8" target="_blank" class="location-link"
                style="text-decoration:none; color:#ffffff;">
                <p class="mb-4 fw-bold" style="font-size: 1.1rem; margin-right: 12px;">📍 Konum</p>
            </a>

            <div class="social-icons d-flex justify-content-center gap-4 mb-4">
                <a href="https://www.instagram.com/cavusoglucafepastane/" target="_blank">
                    <img src="/images/instagram.jpg" alt="Instagram"
                        style="width: 42px; border-radius: 50%; transition: transform 0.3s;">
                </a>
                <a href="https://www.facebook.com/profile.php?id=61582412000452" target="_blank">
                    <img src="/images/facebook.jpg" alt="Facebook"
                        style="width: 42px; border-radius: 50%; transition: transform 0.3s;">
                </a>
            </div>

            <hr style="width: 50%; margin: 20px auto; border-color: #ccc;">

            <p class="mt-3 mb-0" style="font-size: 14px; letter-spacing: 1px; font-weight: 500;">
                @2025 Çavuşoğlu Cafe & Pastane
            </p>
        </div>
    </footer>

    <a href="tel:05555555555" class="floating-call-btn">📞</a>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadCategoriesHome();
            initSearch();
        });
    </script>
</body>

</html>
