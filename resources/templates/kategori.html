<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menü - Çavuşoğlu Pastanesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Geri Dön Butonu Stili */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            color: #333;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #fff;
            transform: scale(1.1);
        }

        .hero {
            position: relative;
            height: 250px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .hero-title {
            position: relative;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
        }
    </style>
</head>

<body class="bg-light">

    <header id="categoryHero" class="hero" style="background-image: url('/images/default.jpg');">
        <div class="hero-overlay"></div>
        <a href="/" class="back-btn shadow">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="hero-title" id="categoryTitle">Menü</h1>
    </header>

    <div class="container mt-4">
        <div id="menu" class="row g-3">
        </div>

        <div class="text-center mt-5 mb-5">
            <a href="/" class="btn btn-outline-dark px-4 rounded-pill">Ana Sayfaya Dön</a>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadCategoryProducts(); // Hem ürünleri hem kategori resmini yükler
        });
    </script>
</body>

</html>
