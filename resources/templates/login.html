<!DOCTYPE html>
<html>

<head>

    <title>Admin Giriş</title>

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: linear-gradient(135deg, #f5f5f5, #eaeaea);
        }

        .login-box {

            width: 350px;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;

        }

        h2 {
            margin-bottom: 20px;
        }

        input {

            width: 93%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;

        }

        button {

            width: 100%;
            padding: 10px;
            border: none;
            background: #333;
            color: white;
            border-radius: 6px;
            cursor: pointer;

        }

        button:hover {

            background: #555;

        }
    </style>

</head>

<body>

    <div class="login-box">

        <h2>Admin Panel</h2>

        <form method="post" action="/login">

            <input type="text" name="username" placeholder="Kullanıcı adı">

            <input type="password" name="password" placeholder="Şifre">

            <button type="submit">Giriş Yap</button>

        </form>

    </div>

</body>

</html>
