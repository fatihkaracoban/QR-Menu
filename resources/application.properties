# ==============================================================
# UYGULAMA AYARLARI
# ==============================================================
spring.application.name=qrmenu
server.port=8080

# ==============================================================
# H2 VERİTABANI AYARLARI (FILE MODE)
# ==============================================================
# Veriler proje klasöründeki /data klasörüne kaydedilir, silinmez.
spring.datasource.url=jdbc:h2:file:./data/qrmenu_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# ==============================================================
# JPA / HIBERNATE AYARLARI
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' çok önemli: Tabloları oluşturur ama içindeki veriyi silmez.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Open-In-View uyarısını kapatmak için:
spring.jpa.open-in-view=false

# ==============================================================
# H2 CONSOLE AYARLARI
# ==============================================================
spring.h2.console.enabled=true
# Eğer 404 almaya devam edersen sonuna / ekleyerek (h2-console/) dene.
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ==============================================================
# DOSYA YÜKLEME VE YOL AYARLARI (Resimler için)
# ==============================================================
# Resimlerin yükleneceği klasör (Proje ana dizininde uploads klasörü)
file.upload-dir=uploads
# Dosya boyutu sınırlarını artırıyoruz (yüksek çözünürlüklü resimler için)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB